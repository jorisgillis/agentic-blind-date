{{define "onboard.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Blind Date — Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🤖</div>
      <h1 class="text-2xl font-black">The agents are on it</h1>
      <p class="text-gray-400 text-sm mt-1">@{{.GitHubHandle}}</p>
    </div>

    {{/* The fragment self-contains the polling div (hx-swap="outerHTML") */}}
    {{/* fragment self-contains the polling div */}}
    {{template "fragment-pipeline-step.html" .}}

  </div>
  <script>
    function renderMd() {
      document.querySelectorAll('[data-md]').forEach(el => {
        el.innerHTML = marked.parseInline(el.textContent);
      });
    }
    document.addEventListener('DOMContentLoaded', renderMd);
    document.addEventListener('htmx:afterSwap', renderMd);
  </script>
</body>
</html>
{{end}}
